name: Merge latest main into UI fixes

on:
  push:
    branches:
      - fix/compact-join-telegram-poll-comments

permissions:
  contents: write

jobs:
  merge-main:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: fix/compact-join-telegram-poll-comments

      - name: Merge latest main and resolve expected UI conflict
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          set +e
          git merge --no-commit --no-ff origin/main
          merge_exit=$?
          set -e
          if [ "$merge_exit" -ne 0 ]; then
            conflicts="$(git diff --name-only --diff-filter=U)"
            expected="lib/features/public_requests/public_request_media_screens.dart"
            if [ "$conflicts" != "$expected" ]; then
              echo "Unexpected merge conflicts:"
              echo "$conflicts"
              exit 1
            fi
            git checkout --ours "$expected"
            git add "$expected"
          fi
          if git diff --name-only --diff-filter=U | grep -q .; then
            echo "Unresolved merge conflicts remain"
            git diff --name-only --diff-filter=U
            exit 1
          fi

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze merged result
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Test merged result
        run: flutter test

      - name: Commit and push merged result
        run: |
          git commit -m "Merge latest main into UI fixes"
          git push origin HEAD:fix/compact-join-telegram-poll-comments
