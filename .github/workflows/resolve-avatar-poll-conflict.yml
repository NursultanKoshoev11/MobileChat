name: Resolve avatar and poll integration

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  resolve:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Preserve latest main avatar formatting
        run: |
          python3 - <<'PY'
          from pathlib import Path

          path = Path('lib/features/public_requests/public_request_media_screens.dart')
          text = path.read_text(encoding='utf-8')

          replacements = [
              (
                  "                KoomAvatar(label: request.authorName, radius: 20),",
                  """                KoomAvatar(
                  label: request.authorName,
                  radius: 20,
                  imageBytes: request.authorAvatarBytes,
                ),""",
                  'post avatar',
              ),
              (
                  """                overflow:
                    compact ? TextOverflow.ellipsis : TextOverflow.visible,""",
                  """                overflow: compact
                    ? TextOverflow.ellipsis
                    : TextOverflow.visible,""",
                  'body overflow formatting',
              ),
              (
                  """      appBar: AppBar(
          title: Text(text.readPost), actions: const [AppSettingsButton()]),""",
                  """      appBar: AppBar(
        title: Text(text.readPost),
        actions: const [AppSettingsButton()],
      ),""",
                  'details app bar',
              ),
          ]

          for old, new, label in replacements:
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{label}: expected one match, found {count}')
              text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Commit resolved integration
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/public_requests/public_request_media_screens.dart
          git commit -m "Resolve avatar and poll UI integration"
          git push origin "HEAD:${BRANCH_NAME}"
