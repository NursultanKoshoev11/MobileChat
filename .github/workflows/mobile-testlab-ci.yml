name: Mobile Test Lab CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      run_firebase_test_lab:
        description: Run Firebase Test Lab after building APKs
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: read

jobs:
  mobile:
    runs-on: ubuntu-latest
    env:
      API_BASE_URL: ${{ secrets.TEST_API_BASE_URL || 'https://kginnovation.duckdns.org' }}
      TEST_AUTH_PHONE: ${{ secrets.TEST_AUTH_PHONE || '+996700000001' }}
      TEST_AUTH_CODE: ${{ secrets.TEST_AUTH_CODE || '111111' }}
      TEST_AUTH_DISPLAY_NAME: ${{ secrets.TEST_AUTH_DISPLAY_NAME || 'Firebase Test User' }}
      FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
      TESTLAB_DEVICE_MODEL: ${{ vars.TESTLAB_DEVICE_MODEL || 'Pixel2' }}
      TESTLAB_DEVICE_VERSION: ${{ vars.TESTLAB_DEVICE_VERSION || '30' }}
      TESTLAB_DEVICE_LOCALE: ${{ vars.TESTLAB_DEVICE_LOCALE || 'en' }}
      TESTLAB_DEVICE_ORIENTATION: ${{ vars.TESTLAB_DEVICE_ORIENTATION || 'portrait' }}

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.x'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format check
        run: dart format --set-exit-if-changed lib test integration_test

      - name: Analyze
        run: flutter analyze

      - name: Unit and widget tests
        run: flutter test

      - name: Build debug app APK for Firebase Test Lab
        run: |
          flutter build apk --debug             --target=integration_test/app_flow_test.dart             --dart-define=API_BASE_URL="$API_BASE_URL"             --dart-define=TEST_AUTH_PHONE="$TEST_AUTH_PHONE"             --dart-define=TEST_AUTH_CODE="$TEST_AUTH_CODE"             --dart-define=TEST_AUTH_DISPLAY_NAME="$TEST_AUTH_DISPLAY_NAME"

      - name: Build Android instrumentation test APK
        working-directory: android
        run: ./gradlew app:assembleDebugAndroidTest -Ptarget=../integration_test/app_flow_test.dart

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: mobile-testlab-apks
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/apk/androidTest/debug/app-debug-androidTest.apk
          if-no-files-found: error

      - name: Authenticate to Google Cloud
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_firebase_test_lab == 'true' && env.FIREBASE_PROJECT_ID != '' }}
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_TESTLAB_SERVICE_ACCOUNT_JSON }}

      - name: Set up gcloud
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_firebase_test_lab == 'true' && env.FIREBASE_PROJECT_ID != '' }}
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.FIREBASE_PROJECT_ID }}

      - name: Run Firebase Test Lab instrumentation test
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_firebase_test_lab == 'true' && env.FIREBASE_PROJECT_ID != '' }}
        run: |
          gcloud firebase test android run             --type instrumentation             --app build/app/outputs/flutter-apk/app-debug.apk             --test build/app/outputs/apk/androidTest/debug/app-debug-androidTest.apk             --device model="$TESTLAB_DEVICE_MODEL",version="$TESTLAB_DEVICE_VERSION",locale="$TESTLAB_DEVICE_LOCALE",orientation="$TESTLAB_DEVICE_ORIENTATION"             --timeout 10m             --results-dir "mobile-chat/${GITHUB_RUN_ID}"
