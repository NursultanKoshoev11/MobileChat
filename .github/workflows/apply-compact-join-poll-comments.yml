name: Apply compact join, poll and comments fixes

on:
  push:
    branches:
      - fix/compact-join-telegram-poll-comments
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref || github.ref_name }}

      - name: Apply focused UI patch
        run: |
          python3 tool/apply_compact_join_poll_comments.py
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lib/features/public_requests/public_request_media_screens.dart')
          text = path.read_text(encoding='utf-8')
          text = text.replace(
              "final progress = (percentage / 100).clamp(0.0, 1.0);",
              "final progress = (percentage / 100).clamp(0.0, 1.0).toDouble();",
          )
          path.write_text(text, encoding='utf-8')
          PY

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format changed files
        run: |
          dart format \
            lib/features/groups/group_sheets.dart \
            lib/features/public_requests/public_request_media_screens.dart \
            lib/features/public_requests/public_requests_widgets.dart

      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Remove temporary patch files
        run: |
          rm -f tool/apply_compact_join_poll_comments.py
          rm -f .github/workflows/apply-compact-join-poll-comments.yml

      - name: Commit verified fixes
        env:
          BRANCH_NAME: ${{ github.head_ref || github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Fix compact join poll and comments"
          git push origin "HEAD:${BRANCH_NAME}"
