name: Apply admin role UI separation

on:
  push:
    branches: [fix/separate-admin-role-ui]
    paths:
      - .github/workflows/apply-admin-role-ui.yml

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/separate-admin-role-ui
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Separate request-review and owner capabilities
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('lib/features/groups/groups_screen.dart')
          text = path.read_text()
          text = re.sub(r'\bisAdmin\b', 'canReviewGroupCreationRequests', text)

          old = '  bool get canReviewGroupCreationRequests => widget.session.user.isPlatformAdmin;'
          new = '''  bool get canReviewGroupCreationRequests =>
              widget.session.user.canReviewGroupCreationRequests;
          bool get canManageAllGroups => widget.session.user.canManageAllGroups;'''
          if old not in text:
              raise SystemExit('role getter marker not found')
          text = text.replace(old, new, 1)

          old = '''  Future<void> createGroup() async {
              if (!canReviewGroupCreationRequests) {'''
          new = '''  Future<void> createGroup() async {
              if (!canManageAllGroups) {'''
          if old not in text:
              raise SystemExit('createGroup marker not found')
          text = text.replace(old, new, 1)

          text = text.replace(
              'icon: canReviewGroupCreationRequests ? Icons.add_rounded : Icons.verified_user_outlined,',
              'icon: canManageAllGroups ? Icons.add_rounded : Icons.verified_user_outlined,',
              1,
          )
          text = text.replace(
              'label: canReviewGroupCreationRequests ? text.newGroup : text.requestGroup,',
              'label: canManageAllGroups ? text.newGroup : text.requestGroup,',
              1,
          )

          old = '''return _EmptyGroups(
                      canReviewGroupCreationRequests: canReviewGroupCreationRequests,
                      onCreate: createGroup,
                    );'''
          new = '''return _EmptyGroups(
                      canReviewGroupCreationRequests: canManageAllGroups,
                      onCreate: createGroup,
                    );'''
          if old not in text:
              raise SystemExit('empty groups marker not found')
          text = text.replace(old, new, 1)

          old = '                    canDelete: canReviewGroupCreationRequests,'
          new = '                    canDelete: canManageAllGroups,'
          if old not in text:
              raise SystemExit('delete capability marker not found')
          text = text.replace(old, new, 1)

          path.write_text(text)
          PY

      - name: Format and validate
        run: |
          dart format lib/data/models.dart lib/features/groups/groups_screen.dart test/role_permissions_test.dart
          flutter pub get
          flutter analyze --no-fatal-infos --no-fatal-warnings
          flutter test

      - name: Commit validated UI separation
        run: |
          rm .github/workflows/apply-admin-role-ui.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add lib/features/groups/groups_screen.dart lib/data/models.dart test/role_permissions_test.dart .github/workflows/apply-admin-role-ui.yml
          git commit -m "Separate platform and super admin UI permissions"
          git push origin HEAD:fix/separate-admin-role-ui
