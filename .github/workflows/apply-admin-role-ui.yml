name: Apply admin role UI separation

on:
  push:
    branches: [fix/separate-admin-role-ui]
    paths:
      - .github/workflows/apply-admin-role-ui.yml
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  patch-test-commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: fix/separate-admin-role-ui
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Separate request-review and owner capabilities
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          path = Path('lib/features/groups/groups_screen.dart')
          text = path.read_text()
          text = re.sub(r'\bisAdmin\b', 'canReviewGroupCreationRequests', text)

          text, count = re.subn(
              r'  bool get canReviewGroupCreationRequests =>\s*widget\.session\.user\.(?:isPlatformAdmin|canReviewGroupCreationRequests);',
              '  bool get canReviewGroupCreationRequests =>\n      widget.session.user.canReviewGroupCreationRequests;\n  bool get canManageAllGroups => widget.session.user.canManageAllGroups;',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit(f'role getter replacement count={count}')

          text, count = re.subn(
              r'(Future<void> createGroup\(\) async \{\s*)if \(!canReviewGroupCreationRequests\)',
              r'\1if (!canManageAllGroups)',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit(f'createGroup replacement count={count}')

          text = text.replace(
              'icon: canReviewGroupCreationRequests ? Icons.add_rounded : Icons.verified_user_outlined,',
              'icon: canManageAllGroups ? Icons.add_rounded : Icons.verified_user_outlined,',
              1,
          )
          text = text.replace(
              'label: canReviewGroupCreationRequests ? text.newGroup : text.requestGroup,',
              'label: canManageAllGroups ? text.newGroup : text.requestGroup,',
              1,
          )

          text, count = re.subn(
              r'(return _EmptyGroups\(\s*canReviewGroupCreationRequests:) canReviewGroupCreationRequests,',
              r'\1 canManageAllGroups,',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit(f'empty groups replacement count={count}')

          text, count = re.subn(
              r'(canDelete:) canReviewGroupCreationRequests,',
              r'\1 canManageAllGroups,',
              text,
              count=1,
          )
          if count != 1:
              raise SystemExit(f'delete replacement count={count}')

          path.write_text(text)
          PY

      - name: Format changed Dart files
        run: dart format lib/data/models.dart lib/features/groups/groups_screen.dart test/role_permissions_test.dart

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter project
        run: flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Run role permission regression tests
        run: flutter test test/role_permissions_test.dart

      - name: Run all Flutter tests
        run: flutter test

      - name: Commit validated UI separation
        run: |
          rm .github/workflows/apply-admin-role-ui.yml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add lib/features/groups/groups_screen.dart lib/data/models.dart test/role_permissions_test.dart .github/workflows/apply-admin-role-ui.yml
          git commit -m "Separate platform and super admin UI permissions"
          git push origin HEAD:fix/separate-admin-role-ui
