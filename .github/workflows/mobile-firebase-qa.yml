name: Mobile Firebase Test Lab QA

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Backend API base URL used by the APK"
        required: true
        default: "https://koom.servemp3.com"
      run_robo:
        description: "Run Firebase Robo crawl"
        required: false
        default: "true"
      run_integration:
        description: "Run Flutter integration_test on Firebase Test Lab"
        required: false
        default: "true"

permissions:
  contents: read

env:
  GCP_PROJECT: koom-9f163
  TEST_AUTH_PHONE: ${{ secrets.TEST_AUTH_PHONE || '+996700000001' }}
  TEST_AUTH_CODE: ${{ secrets.TEST_AUTH_CODE || '111111' }}
  TEST_AUTH_DISPLAY_NAME: ${{ secrets.TEST_AUTH_DISPLAY_NAME || 'Firebase Test User' }}

jobs:
  firebase-mobile-qa:
    name: APK Robo + integration QA
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Restore Android wrapper files
        run: |
          flutter create --platforms=android --project-name mobile_chat .
          git checkout -- \
            android/settings.gradle \
            android/build.gradle \
            android/app/build.gradle \
            android/app/proguard-rules.pro \
            android/app/src/main/AndroidManifest.xml \
            android/app/src/debug/AndroidManifest.xml \
            android/app/src/main/kotlin/com/nursultankoshoev/mobilechat/MainActivity.kt \
            android/app/src/main/res/values/styles.xml \
            android/app/src/main/res/values/colors.xml \
            android/app/src/main/res/drawable/launch_background.xml \
            android/app/src/main/res/drawable/ic_launcher_foreground.xml \
            android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml

      - name: Create Android local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Static checks
        run: |
          flutter analyze
          flutter test

      - name: Build debug APK for Firebase Test Lab
        run: |
          flutter build apk --debug \
            -t lib/main.dart \
            --dart-define=API_BASE_URL="${{ inputs.api_base_url }}" \
            --dart-define=TEST_AUTH_PHONE="$TEST_AUTH_PHONE" \
            --dart-define=TEST_AUTH_CODE="$TEST_AUTH_CODE" \
            --dart-define=TEST_AUTH_DISPLAY_NAME="$TEST_AUTH_DISPLAY_NAME"

      - name: Build Android instrumentation test APK
        if: ${{ inputs.run_integration == 'true' }}
        run: |
          cd android
          ./gradlew app:assembleAndroidTest -Ptarget=../integration_test/app_flow_test.dart
          cd ..

      - name: Run Firebase Robo crawl
        if: ${{ inputs.run_robo == 'true' }}
        env:
          FIREBASE_RESULTS_BUCKET: ${{ secrets.FIREBASE_RESULTS_BUCKET }}
          FIREBASE_TEST_DEVICE: model=Pixel2,version=30,locale=ru,orientation=portrait
        run: bash scripts/run_firebase_robo.sh build/app/outputs/flutter-apk/app-debug.apk

      - name: Run Firebase Flutter integration test
        if: ${{ inputs.run_integration == 'true' }}
        env:
          FIREBASE_RESULTS_BUCKET: ${{ secrets.FIREBASE_RESULTS_BUCKET }}
          FIREBASE_TEST_DEVICE: model=Pixel2,version=30,locale=ru,orientation=portrait
        run: bash scripts/run_firebase_integration_testlab.sh

      - name: Upload APK and local QA files
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: mobile-firebase-qa-local-artifacts
          path: |
            build/app/outputs/flutter-apk/app-debug.apk
            build/app/outputs/apk/androidTest/debug/app-debug-androidTest.apk
          if-no-files-found: warn
          retention-days: 14
