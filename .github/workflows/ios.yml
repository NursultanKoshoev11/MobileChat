name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Backend API base URL for the iOS build. For a real iPhone use HTTPS or your PC LAN IP."
        required: false
        default: "http://127.0.0.1:8080"

permissions:
  contents: read

jobs:
  build-ios-simulator:
    name: Build unsigned iOS simulator app
    runs-on: macos-14

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter doctor
        run: flutter doctor -v

      - name: Ensure iOS platform files exist
        run: flutter create --platforms=ios --project-name mobile_chat .

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze Dart code
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Build iOS simulator app
        run: |
          API_BASE_URL="${{ github.event.inputs.api_base_url || 'http://127.0.0.1:8080' }}"
          echo "Building iOS simulator app with API_BASE_URL=$API_BASE_URL"
          flutter build ios --debug --simulator -t lib/main_clean.dart --dart-define=API_BASE_URL="$API_BASE_URL"

      - name: Prepare simulator artifact
        run: |
          mkdir -p build-artifacts
          ditto -c -k --sequesterRsrc --keepParent build/ios/iphonesimulator/Runner.app build-artifacts/MobileChat-iOS-simulator-app.zip
          shasum -a 256 build-artifacts/MobileChat-iOS-simulator-app.zip > build-artifacts/MobileChat-iOS-simulator-app.sha256.txt
          ls -lah build-artifacts

      - name: Upload simulator app artifact
        uses: actions/upload-artifact@v4
        with:
          name: MobileChat-iOS-simulator-app
          path: |
            build-artifacts/MobileChat-iOS-simulator-app.zip
            build-artifacts/MobileChat-iOS-simulator-app.sha256.txt
          if-no-files-found: error
          retention-days: 14

  build-signed-ipa:
    name: Build signed iPhone IPA
    runs-on: macos-14
    if: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 != '' && secrets.IOS_CERTIFICATE_PASSWORD != '' && secrets.IOS_PROVISIONING_PROFILE_BASE64 != '' && secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 != '' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter doctor
        run: flutter doctor -v

      - name: Ensure iOS platform files exist
        run: flutter create --platforms=ios --project-name mobile_chat .

      - name: Install Apple signing certificate and provisioning profile
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD || 'mobilechat-ci-keychain' }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/mobilechat_certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/mobilechat.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/mobilechat-signing.keychain-db"

          echo -n "$IOS_CERTIFICATE_P12_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          echo -n "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          UUID=$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/$UUID.mobileprovision"

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS archive without codesign by Flutter
        run: |
          API_BASE_URL="${{ github.event.inputs.api_base_url || 'http://127.0.0.1:8080' }}"
          flutter build ipa --release -t lib/main_clean.dart --dart-define=API_BASE_URL="$API_BASE_URL" --export-options-plist=ios/ExportOptions.plist
        env:
          FLUTTER_XCODE_CODE_SIGN_STYLE: Manual

      - name: Decode export options plist when provided by secret
        if: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 != '' }}
        env:
          IOS_EXPORT_OPTIONS_PLIST_BASE64: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST_BASE64 }}
        run: echo -n "$IOS_EXPORT_OPTIONS_PLIST_BASE64" | base64 --decode > ios/ExportOptions.plist

      - name: Prepare IPA artifact
        run: |
          mkdir -p build-artifacts
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" -print -quit)
          if [ -z "$IPA_PATH" ]; then
            echo "No IPA found in build/ios/ipa"
            exit 1
          fi
          cp "$IPA_PATH" build-artifacts/MobileChat-signed.ipa
          shasum -a 256 build-artifacts/MobileChat-signed.ipa > build-artifacts/MobileChat-signed.sha256.txt
          ls -lah build-artifacts

      - name: Upload signed IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: MobileChat-signed-ipa
          path: |
            build-artifacts/MobileChat-signed.ipa
            build-artifacts/MobileChat-signed.sha256.txt
          if-no-files-found: error
          retention-days: 14
