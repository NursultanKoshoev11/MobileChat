name: Android Offline Demo APK

on:
  workflow_dispatch:
  push:
    branches:
      - offline-demo

permissions:
  contents: read

jobs:
  build-offline-demo:
    name: Build offline demo APK from offline-demo branch
    runs-on: ubuntu-latest

    steps:
      - name: Checkout offline-demo branch
        uses: actions/checkout@v4
        with:
          ref: offline-demo

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter doctor
        run: flutter doctor -v

      - name: Ensure Android wrapper files exist
        run: flutter create --platforms=android --project-name mobile_chat .

      - name: Restore Android project files
        run: |
          git checkout -- android/settings.gradle
          git checkout -- android/build.gradle
          git checkout -- android/app/build.gradle
          git checkout -- android/app/proguard-rules.pro
          git checkout -- android/app/src/main/AndroidManifest.xml
          git checkout -- android/app/src/debug/AndroidManifest.xml
          git checkout -- android/app/src/main/kotlin/com/nursultankoshoev/mobilechat/MainActivity.kt
          git checkout -- android/app/src/main/res/values/styles.xml
          git checkout -- android/app/src/main/res/values/colors.xml
          git checkout -- android/app/src/main/res/drawable/launch_background.xml
          git checkout -- android/app/src/main/res/drawable/ic_launcher_foreground.xml
          git checkout -- android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml

      - name: Prepare offline Android manifest
        run: |
          sed -i '/android.permission.INTERNET/d' android/app/src/main/AndroidManifest.xml
          sed -i '/android.permission.ACCESS_NETWORK_STATE/d' android/app/src/main/AndroidManifest.xml
          sed -i '/android.permission.POST_NOTIFICATIONS/d' android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label="MobileChat"/android:label="MobileChat Offline"/g' android/app/src/main/AndroidManifest.xml
          cat android/app/src/main/AndroidManifest.xml

      - name: Patch offline login to open immediately
        run: python3 scripts/patch_offline_login.py

      - name: Patch offline Read buttons
        run: python3 scripts/patch_offline_read_buttons.py

      - name: Patch offline light and dark theme
        run: python3 scripts/patch_offline_theme.py

      - name: Create Android local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze offline app
        run: flutter analyze lib/main_offline.dart test/widget_test.dart

      - name: Run tests
        run: flutter test

      - name: Build offline APK
        run: flutter build apk --debug -t lib/main_offline.dart

      - name: Prepare APK artifact
        run: |
          mkdir -p build-artifacts
          cp build/app/outputs/flutter-apk/app-debug.apk build-artifacts/MobileChat-offline-demo.apk
          sha256sum build-artifacts/MobileChat-offline-demo.apk > build-artifacts/MobileChat-offline-demo.sha256.txt
          ls -lah build-artifacts

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: MobileChat-offline-demo-apk
          path: |
            build-artifacts/MobileChat-offline-demo.apk
            build-artifacts/MobileChat-offline-demo.sha256.txt
          if-no-files-found: error
          retention-days: 14
