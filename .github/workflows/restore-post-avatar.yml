name: Restore post avatar after poll merge

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  restore-and-test:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout feature branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.head_ref }}

      - name: Restore author avatar in publication card
        run: |
          python3 - <<'PY'
          from pathlib import Path
          path = Path('lib/features/public_requests/public_request_media_screens.dart')
          text = path.read_text(encoding='utf-8')
          old = '                KoomAvatar(label: request.authorName, radius: 20),'
          new = '''                KoomAvatar(
                  label: request.authorName,
                  radius: 20,
                  imageBytes: request.authorAvatarBytes,
                ),'''
          count = text.count(old)
          if count != 1:
              raise RuntimeError(f'Expected one publication avatar match, found {count}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Format
        run: dart format lib/features/public_requests/public_request_media_screens.dart

      - name: Analyze
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Test
        run: flutter test

      - name: Commit verified avatar restoration
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/features/public_requests/public_request_media_screens.dart
          git commit -m "Restore author avatar in publication card"
          git push origin "HEAD:${BRANCH_NAME}"
