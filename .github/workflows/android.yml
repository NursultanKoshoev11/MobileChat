name: Koom Android AAB

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Backend API base URL for the Android build."
        required: false
        default: "https://koommy.duckdns.org"
      version_code:
        description: "Android versionCode. Must be higher than previous Google Play upload. Defaults to GitHub run number."
        required: false
        default: ""
      version_name:
        description: "Android versionName shown in release metadata. Defaults to 1.0.<run_number>."
        required: false
        default: ""
  push:
    branches:
      - main

permissions:
  contents: read

env:
  DEFAULT_API_BASE_URL: "https://koommy.duckdns.org"

jobs:
  build-android-aab:
    name: Koom Android CI / AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter doctor
        run: flutter doctor -v

      - name: Ensure Android wrapper files exist
        run: flutter create --platforms=android --project-name mobile_chat .

      - name: Restore project Android configuration
        run: |
          git checkout -- \
            android/settings.gradle \
            android/build.gradle \
            android/app/build.gradle \
            android/app/proguard-rules.pro \
            android/app/src/main/AndroidManifest.xml \
            android/app/src/debug/AndroidManifest.xml \
            android/app/src/main/kotlin/com/nursultankoshoev/mobilechat/MainActivity.kt \
            android/app/src/main/res/values/styles.xml \
            android/app/src/main/res/values/colors.xml \
            android/app/src/main/res/drawable/launch_background.xml \
            android/app/src/main/res/drawable/ic_launcher_foreground.xml \
            android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml \
            android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml

      - name: Verify Firebase Android config
        env:
          GOOGLE_SERVICES_JSON_B64: ${{ secrets.GOOGLE_SERVICES_JSON_B64 }}
        run: |
          if [ -s android/app/google-services.json ]; then
            echo "Using committed android/app/google-services.json"
          elif [ -n "$GOOGLE_SERVICES_JSON_B64" ]; then
            echo "$GOOGLE_SERVICES_JSON_B64" | base64 --decode > android/app/google-services.json
            echo "Created android/app/google-services.json from GOOGLE_SERVICES_JSON_B64 secret"
          else
            echo "Firebase config is required for FCM push notifications. Add android/app/google-services.json or set GOOGLE_SERVICES_JSON_B64 secret."
            exit 1
          fi
          test -s android/app/google-services.json

      - name: Configure Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -z "$ANDROID_KEYSTORE_BASE64" ] || [ -z "$ANDROID_KEYSTORE_PASSWORD" ] || [ -z "$ANDROID_KEY_ALIAS" ]; then
            echo "Android release signing secrets are required for Google Play AAB builds."
            echo "Required GitHub Secrets: ANDROID_KEYSTORE_BASE64, ANDROID_KEYSTORE_PASSWORD, ANDROID_KEY_ALIAS."
            echo "ANDROID_KEY_PASSWORD is optional and defaults to ANDROID_KEYSTORE_PASSWORD."
            exit 1
          fi
          if [ -z "$ANDROID_KEY_PASSWORD" ]; then
            ANDROID_KEY_PASSWORD="$ANDROID_KEYSTORE_PASSWORD"
          fi
          umask 077
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.p12
          test -s android/app/upload-keystore.p12
          keytool -list \
            -keystore android/app/upload-keystore.p12 \
            -storetype PKCS12 \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" \
            -alias "$ANDROID_KEY_ALIAS" >/dev/null
          cat > android/key.properties <<EOF
          storePassword=$ANDROID_KEYSTORE_PASSWORD
          keyPassword=$ANDROID_KEY_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          storeType=pkcs12
          storeFile=upload-keystore.p12
          EOF
          chmod 600 android/app/upload-keystore.p12 android/key.properties
          test -s android/key.properties

      - name: Create Android local.properties
        run: |
          VERSION_CODE="${{ github.event.inputs.version_code }}"
          VERSION_NAME="${{ github.event.inputs.version_name }}"
          if [ -z "$VERSION_CODE" ]; then
            VERSION_CODE="${{ github.run_number }}"
          fi
          if [ -z "$VERSION_NAME" ]; then
            VERSION_NAME="1.0.${{ github.run_number }}"
          fi
          echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties
          echo "flutter.versionCode=$VERSION_CODE" >> android/local.properties
          echo "flutter.versionName=$VERSION_NAME" >> android/local.properties
          echo "VERSION_CODE=$VERSION_CODE" >> "$GITHUB_ENV"
          echo "VERSION_NAME=$VERSION_NAME" >> "$GITHUB_ENV"
          if ! [[ "$VERSION_CODE" =~ ^[1-9][0-9]*$ ]]; then
            echo "versionCode must be a positive integer, got: $VERSION_CODE"
            exit 1
          fi
          if [ "$VERSION_CODE" -gt 2100000000 ]; then
            echo "versionCode exceeds Android maximum: $VERSION_CODE"
            exit 1
          fi
          echo "Using versionCode=$VERSION_CODE versionName=$VERSION_NAME"

      - name: Install dependencies
        run: flutter pub get

      - name: Resolve API base URL
        run: |
          API_BASE_URL="${{ github.event.inputs.api_base_url }}"
          if [ -z "$API_BASE_URL" ]; then
            API_BASE_URL="$DEFAULT_API_BASE_URL"
          fi
          if [ -z "$API_BASE_URL" ]; then
            echo "API_BASE_URL is required"
            exit 1
          fi
          case "$API_BASE_URL" in
            https://*) echo "API_BASE_URL is valid: $API_BASE_URL" ;;
            *) echo "API_BASE_URL must start with https://" && exit 1 ;;
          esac
          echo "API_BASE_URL=$API_BASE_URL" >> "$GITHUB_ENV"

      - name: Build Google Play release AAB
        run: |
          echo "Building release AAB with API_BASE_URL=$API_BASE_URL"
          flutter build appbundle \
            --release \
            -t lib/main.dart \
            --build-number="$VERSION_CODE" \
            --build-name="$VERSION_NAME" \
            --dart-define=API_BASE_URL="$API_BASE_URL"

      - name: Verify AAB artifact exists
        run: |
          AAB_PATH="build/app/outputs/bundle/release/app-release.aab"
          test -s "$AAB_PATH"
          ls -lah "$AAB_PATH"
          unzip -l "$AAB_PATH" | tee aab-contents.txt >/dev/null

          ACTUAL_VERSION_CODE="$(sed -n 's/^flutter.versionCode=//p' android/local.properties | tail -n 1)"
          ACTUAL_VERSION_NAME="$(sed -n 's/^flutter.versionName=//p' android/local.properties | tail -n 1)"
          if [ "$ACTUAL_VERSION_CODE" != "$VERSION_CODE" ]; then
            echo "Built versionCode mismatch: expected $VERSION_CODE, got $ACTUAL_VERSION_CODE"
            exit 1
          fi
          if [ "$ACTUAL_VERSION_NAME" != "$VERSION_NAME" ]; then
            echo "Built versionName mismatch: expected $VERSION_NAME, got $ACTUAL_VERSION_NAME"
            exit 1
          fi

          MERGED_MANIFEST=""
          while IFS= read -r manifest; do
            if grep -q "android:versionCode=\"$VERSION_CODE\"" "$manifest"; then
              MERGED_MANIFEST="$manifest"
              break
            fi
          done < <(find build/app/intermediates -type f -path '*release*' -name AndroidManifest.xml | sort)
          if [ -z "$MERGED_MANIFEST" ]; then
            echo "Could not verify versionCode=$VERSION_CODE in the merged release manifest."
            find build/app/intermediates -type f -path '*release*' -name AndroidManifest.xml -print || true
            exit 1
          fi
          echo "Verified AAB versionCode=$VERSION_CODE versionName=$VERSION_NAME via $MERGED_MANIFEST"

      - name: Prepare Google Play artifact
        run: |
          mkdir -p build-artifacts
          cp build/app/outputs/bundle/release/app-release.aab build-artifacts/Koom-release-v${VERSION_CODE}.aab
          sha256sum build-artifacts/Koom-release-v${VERSION_CODE}.aab > build-artifacts/Koom-release-v${VERSION_CODE}.sha256.txt
          printf 'API_BASE_URL=%s\nVERSION_CODE=%s\nVERSION_NAME=%s\n' "$API_BASE_URL" "$VERSION_CODE" "$VERSION_NAME" > build-artifacts/Koom-release-v${VERSION_CODE}.txt
          ls -lah build-artifacts

      - name: Upload Google Play AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: Koom-release-aab
          path: |
            build-artifacts/Koom-release-v*.aab
            build-artifacts/Koom-release-v*.sha256.txt
            build-artifacts/Koom-release-v*.txt
          if-no-files-found: error
          retention-days: 14
