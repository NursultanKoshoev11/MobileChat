name: Android APK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      api_base_url:
        description: "Backend API base URL for the Android build"
        required: false
        default: "http://10.0.2.2:8080"

jobs:
  build-android:
    name: Build Android debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Ensure Android wrapper files exist
        run: flutter create --platforms=android --project-name mobile_chat .

      - name: Restore project Android configuration
        run: |
          git checkout -- android/settings.gradle android/build.gradle android/app/build.gradle android/app/src/main/AndroidManifest.xml android/app/src/debug/AndroidManifest.xml android/app/src/main/kotlin/com/nursultankoshoev/mobilechat/MainActivity.kt android/app/src/main/res/values/styles.xml android/app/src/main/res/values/colors.xml android/app/src/main/res/drawable/launch_background.xml android/app/src/main/res/drawable/ic_launcher_foreground.xml android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml

      - name: Create Android local.properties
        run: echo "flutter.sdk=$FLUTTER_ROOT" > android/local.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build debug APK
        run: |
          API_BASE_URL="${{ github.event.inputs.api_base_url || 'http://10.0.2.2:8080' }}"
          flutter build apk --debug -t lib/main_clean.dart --dart-define=API_BASE_URL="$API_BASE_URL"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobilechat-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
