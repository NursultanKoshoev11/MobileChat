plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def googleServicesFile = file("google-services.json")
def requestedTaskNames = gradle.startParameter.taskNames.collect { it.toLowerCase() }
def needsFirebaseConfigTask = requestedTaskNames.isEmpty() || requestedTaskNames.any { name ->
    name.contains("profile") || name.contains("release") || name.contains("bundle")
}
if (googleServicesFile.exists() && needsFirebaseConfigTask) {
    apply plugin: "com.google.gms.google-services"
} else if (needsFirebaseConfigTask) {
    gradle.taskGraph.whenReady { graph ->
        def needsFirebaseConfig = requestedTaskNames.any { name ->
            name.contains("profile") || name.contains("release")
        } || (requestedTaskNames.isEmpty() && graph.allTasks.any { task ->
            def name = task.name
            name.endsWith("Profile") || name.endsWith("Release")
        }
        )
        if (needsFirebaseConfig) {
            throw new GradleException("android/app/google-services.json is required for profile/release builds. Add GOOGLE_SERVICES_JSON_B64 to GitHub Actions secrets or place google-services.json locally.")
        }
    }
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader("UTF-8") { reader -> localProperties.load(reader) }
}

def flutterVersionCode = localProperties.getProperty("flutter.versionCode") ?: "267"
def flutterVersionName = localProperties.getProperty("flutter.versionName") ?: "0.5.0"

android {
    namespace "com.nursultankoshoev.mobilechat"
    compileSdk 36
    ndkVersion flutter.ndkVersion

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    defaultConfig {
        applicationId "com.nursultankoshoev.mobilechat"
        minSdkVersion flutter.minSdkVersion
        targetSdk 35
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

        ndk {
            abiFilters "arm64-v8a", "armeabi-v7a"
        }
    }

    packagingOptions {
        jniLibs {
            useLegacyPackaging false
            excludes += [
                "lib/x86/**",
                "lib/x86_64/**"
            ]
        }
    }

    signingConfigs {
        release {
            def keystorePropertiesFile = rootProject.file("key.properties")
            if (keystorePropertiesFile.exists()) {
                def keystoreProperties = new Properties()
                keystorePropertiesFile.withInputStream { keystoreProperties.load(it) }
                keyAlias keystoreProperties["keyAlias"]
                keyPassword keystoreProperties["keyPassword"]
                storeFile file(keystoreProperties["storeFile"])
                storePassword keystoreProperties["storePassword"]
                if (keystoreProperties["storeType"] != null) {
                    storeType keystoreProperties["storeType"]
                }
            }
        }
    }

    buildTypes {
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

flutter {
    source "../.."
}

dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.4"
    implementation "androidx.multidex:multidex:2.0.1"
    androidTestImplementation "androidx.test:runner:1.3.0"
    androidTestImplementation "androidx.test:rules:1.2.0"
}
