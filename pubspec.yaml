name: mobile_chat
version: 0.5.0+5
publish_to: none

description: Flutter group post feed app for Android and iOS.

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  flutter_secure_storage: ^9.2.2
  web_socket_channel: ^3.0.1
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  mobile_scanner: ^7.0.0
  qr_flutter: ^4.1.0
  file_picker: ^8.3.7

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
