name: mobile_chat
version: 0.5.0+6
publish_to: none

description: Koom civic communication app for Android and iOS.

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.2
  http_parser: ^4.1.2
  flutter_secure_storage: ^10.3.1
  web_socket_channel: ^3.0.1
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_local_notifications: ^17.2.4
  mobile_scanner: ^7.0.0
  qr_flutter: ^4.1.0
  file_picker: ^12.0.0-beta.7
  image_picker: ^1.1.2
  flutter_image_compress: ^2.4.0
  path_provider: ^2.1.5
  hive: ^2.2.3
  video_player: ^2.9.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  integration_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/koom_app_icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/koom_app_icon.png
  adaptive_icon_background: '#FFFFFF'
  adaptive_icon_foreground: assets/images/koom_app_icon.png
  remove_alpha_ios: true
